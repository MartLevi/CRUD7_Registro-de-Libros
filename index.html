<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LibroLog — Registro de Libros</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

    <!-- ═══════════════════════════════════════════════════════
       HAMBURGER (visible only on mobile)
  ══════════════════════════════════════════════════════════ -->
  <button id="btn-hamburger" aria-label="Abrir menú">☰</button>

  <!-- Overlay to close sidebar on mobile tap-outside -->
  <div id="sidebar-overlay"></div>

  <!-- ═══════════════════════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════════════════════════ -->
  <aside id="sidebar" role="navigation" aria-label="Menú principal">

    <div class="sidebar-logo">
      <span class="logo-icon" aria-hidden="true">📚</span>
      <h1 class="sidebar-title">LibroLog</h1>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-btn active" data-view="dashboard">
        <span class="nav-icon" aria-hidden="true">📊</span>
        Dashboard
      </button>
      <button class="nav-btn" data-view="libros" aria-current="page">
        <span class="nav-icon" aria-hidden="true">📖</span>
        Mis Libros
      </button>
    </nav>

    <div class="sidebar-footer">
      <button id="btn-dark-mode" class="dark-toggle" aria-label="Cambiar tema">
        <span class="toggle-icon" aria-hidden="true">🌙</span>
        <span class="toggle-label">Modo Oscuro</span>
      </button>
    </div>

  </aside>
  
  <!-- ═══════════════════════════════════════════════════════
       SCRIPTS  (dependency order)
  ══════════════════════════════════════════════════════════ -->
  <script src="js/storage.js"></script>
  <script src="js/validations.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/api.js"></script>
  <script src="js/crud.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
